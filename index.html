<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f9fafb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mission Control</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<style>
/* ── Minimal Professional theme (Anthony-approved design, 2026-07-18) ── */
:root{
 --bg1:#f9fafb;--bg2:#f3f4f6;--card:#ffffff;--tile:#f9fafb;--tileline:#f3f4f6;
 --ink:#111827;--ink2:#4b5563;--muted:#6b7280;--line:#e5e7eb;
 --blue:#3b82f6;--purple:#8b5cf6;
 --good:#16a34a;--goodbg:#f0fdf4;--warn:#d97706;--warnbg:#fffbeb;
 --bad:#dc2626;--badbg:#fef2f2;
 --shadow:0 1px 3px rgba(0,0,0,.05),0 10px 40px rgba(0,0,0,.08);
 --shadow2:0 1px 3px rgba(0,0,0,.05),0 20px 60px rgba(0,0,0,.15);
 --navbg:rgba(255,255,255,.85);
 --cSpy:#6b7280;--cSmh:#8b5cf6;--cBook:#16a34a;
 --tick:#2563eb;--time:#7c3aed;--timebg:#f3e8ff;
 --amber:#b45309;--amberbg:#fef3c7;--teal:#0f766e;--tealbg:#ccfbf1;
 --slate:#475569;--slatebg:#e2e8f0;
 --disp:"Space Grotesk",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
html[data-theme=dark]{
 --bg1:#111827;--bg2:#030712;--card:rgba(31,41,55,.92);--tile:rgba(31,41,55,.5);
 --tileline:#374151;--ink:#f3f4f6;--ink2:#9ca3af;--muted:#6b7280;--line:#374151;
 --blue:#60a5fa;--purple:#a78bfa;
 --good:#4ade80;--goodbg:rgba(20,83,45,.3);--warn:#fbbf24;--warnbg:rgba(120,53,15,.3);
 --bad:#f87171;--badbg:rgba(127,29,29,.3);
 --shadow:0 1px 3px rgba(0,0,0,.3),0 10px 40px rgba(0,0,0,.4);
 --shadow2:0 1px 3px rgba(0,0,0,.3),0 20px 60px rgba(0,0,0,.6);
 --navbg:rgba(17,24,39,.85);
 --cSpy:#9ca3af;--cSmh:#a78bfa;--cBook:#34d399;
 --tick:#60a5fa;--time:#c4b5fd;--timebg:rgba(76,29,149,.4);
 --amber:#fbbf24;--amberbg:rgba(120,53,15,.4);--teal:#2dd4bf;--tealbg:rgba(19,78,74,.45);
 --slate:#94a3b8;--slatebg:rgba(51,65,85,.5)}
@font-face{font-family:"Space Grotesk";
 src:url(spacegrotesk.woff2) format("woff2");
 font-weight:300 700;font-style:normal;font-display:swap}
*{box-sizing:border-box;margin:0}
html{background:var(--bg2)}
body{font:16px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
 background:linear-gradient(135deg,var(--bg1),var(--bg2)) fixed;color:var(--ink);
 padding-bottom:34px;min-height:100vh;transition:background .5s,color .5s;
 overscroll-behavior-x:none}
.wrap{max-width:640px;margin:0 auto;padding:14px 14px 0}
h1{font:600 22px/1.25 var(--disp);letter-spacing:-.02em}
h2{font:600 13.5px/1.35 var(--disp);color:var(--ink2);margin:20px 2px 8px}
h2::before{content:"";display:inline-block;width:14px;height:3px;border-radius:2px;
 background:linear-gradient(90deg,#3b82f6,#8b5cf6);margin-right:7px;vertical-align:3px}
.sub{color:var(--muted);font-size:12.5px;margin-top:1px}
.card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);
 padding:16px;margin-bottom:12px;transition:box-shadow .3s,transform .3s}
@media(hover:hover){.card:hover{box-shadow:var(--shadow2)}}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tile{background:var(--card);border-radius:16px;box-shadow:var(--shadow);
 padding:13px 15px;transition:box-shadow .3s}
.tile .l{font-size:11.5px;font-weight:500;letter-spacing:.3px;color:var(--muted);
 text-transform:uppercase}
.tile .v{font:600 22px/1.25 var(--disp);margin:3px 0 2px;
 font-feature-settings:"tnum";letter-spacing:-.01em}
.tile .s{font-size:12px;color:var(--muted)}
.tile.good .v{color:var(--good)}.tile.warn .v{color:var(--warn)}.tile.bad .v{color:var(--bad)}
.inner{background:var(--tile);border:1px solid var(--tileline);border-radius:10px;padding:12px}
table{width:100%;border-collapse:collapse;font-size:14px}
th{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.4px;
 color:var(--muted);text-align:left;padding:4px 6px;border-bottom:1px solid var(--line)}
td{padding:8px 6px;border-bottom:1px solid var(--line)}
tr:last-child td{border-bottom:0}
.num{text-align:right;font-variant-numeric:tabular-nums}
.pos{color:var(--good)}.neg{color:var(--bad)}
.pillp,.pilln{display:inline-block;font-size:12px;font-weight:500;border-radius:999px;
 padding:2px 9px}
.pillp{color:var(--good);background:var(--goodbg)}
.pilln{color:var(--bad);background:var(--badbg)}
.badge{display:inline-block;background:linear-gradient(90deg,var(--warn),#f59e0b);
 color:#fff;border-radius:999px;font-size:11px;padding:2px 8px;margin-left:6px;font-weight:600}
.tag{display:inline-block;border:1px solid var(--line);border-radius:999px;
 font-size:11.5px;padding:1px 8px;color:var(--ink2);margin-left:6px}
.muted{color:var(--muted)}
details{margin-top:6px}
summary{color:var(--blue);font-size:13px;cursor:pointer}
details p,details li{font-size:13.5px;color:var(--ink2);margin-top:6px}
a{color:var(--blue)}
/* buttons — gradient primary / bordered secondary, per the design */
.bp{font:inherit;font-size:15px;font-weight:500;padding:10px 16px;border-radius:10px;
 border:0;color:#fff;cursor:pointer;
 background:linear-gradient(90deg,#3b82f6,#8b5cf6);
 box-shadow:0 1px 2px rgba(0,0,0,.08);transition:filter .2s,box-shadow .2s}
.bp:hover{filter:brightness(1.06);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.bs{font:inherit;font-size:15px;font-weight:500;padding:10px 16px;border-radius:10px;
 border:1px solid var(--line);background:var(--card);color:var(--ink2);cursor:pointer;
 transition:background .2s}
.inp{font:inherit;font-size:15px;padding:10px 12px;border-radius:10px;
 border:1px solid var(--line);background:var(--tile);color:var(--ink)}
.inp:focus{outline:2px solid var(--blue);outline-offset:-1px}
/* header row: title left · theme toggle + progress ring right */
#hdr{display:flex;align-items:flex-start;justify-content:space-between;
 padding:10px 2px 4px;gap:12px}
#themetog{position:relative;width:56px;height:28px;border-radius:999px;border:0;
 background:#d1d5db;cursor:pointer;transition:background .3s;flex:none}
html[data-theme=dark] #themetog{background:#4b5563}
#knob{position:absolute;top:2px;left:2px;width:24px;height:24px;border-radius:999px;
 background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:transform .3s;
 display:flex;align-items:center;justify-content:center}
html[data-theme=dark] #knob{transform:translateX(28px)}
#knob svg{width:14px;height:14px}
#sunic{display:block;color:#eab308}#moonic{display:none;color:#374151}
html[data-theme=dark] #sunic{display:none}
html[data-theme=dark] #moonic{display:block}
.ring{position:relative;width:60px;height:60px;flex:none;
 animation:float 3s ease-in-out infinite}
.ring svg{display:block}
.ringtxt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
 font-size:13px;font-weight:600;color:var(--ink2)}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
/* top tab bar with sliding gradient underline */
#tabbar{position:sticky;top:0;z-index:20;background:var(--navbg);
 backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
 margin:6px -14px 12px;padding:0 14px calc(0px + 0px);
 border-bottom:1px solid var(--line)}
#tabs{position:relative;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
#tabs button{font:500 14px/1.3 var(--disp);background:none;border:0;
 color:var(--muted);padding:11px 13px 12px;cursor:pointer;white-space:nowrap;
 transition:color .2s}
#tabs button.on{color:var(--blue)}
#uline{position:absolute;bottom:0;height:2.5px;border-radius:2px;
 background:linear-gradient(90deg,#3b82f6,#8b5cf6);
 transition:left .3s ease,width .3s ease;left:0;width:0}
/* sliding tab track: all tabs pre-rendered side by side; the track translates,
   so swipes are a real finger-following animation, not a display toggle */
#tview{overflow:hidden;margin:0 -14px}
#track{display:flex;width:700%;align-items:flex-start;
 transition:transform .32s cubic-bezier(.25,.7,.3,1)}
.tab{width:14.2857%;flex:none;padding:0 14px}
.tab.off{height:0;overflow:hidden}
.chart{position:relative}
.xline{position:absolute;top:0;bottom:40px;width:1.5px;background:var(--blue);
 display:none;pointer-events:none;opacity:.65}
.xread{font-size:12px;min-height:18px;margin-top:4px}
tr.drill td{background:var(--tile)}
/* semantic accents: color always MEANS something (2026-07-18 rework) */
.tk{color:var(--tick);font-weight:600}
.bignum{font:600 28px/1.2 var(--disp);font-feature-settings:"tnum";margin:3px 0}
.pillt{display:inline-block;font-size:11px;font-weight:600;border-radius:999px;
 padding:1.5px 8px;color:var(--time);background:var(--timebg);white-space:nowrap}
.etag{display:inline-block;font-size:11px;font-weight:600;border-radius:999px;
 padding:1.5px 8px;white-space:nowrap}
.etag.amber{color:var(--amber);background:var(--amberbg)}
.etag.teal{color:var(--teal);background:var(--tealbg)}
.etag.slate{color:var(--slate);background:var(--slatebg)}
.etag.blue{color:var(--tick);background:var(--timebg)}
.sdot{display:inline-block;width:8px;height:8px;border-radius:99px;margin-right:7px;
 vertical-align:1px}
/* Today tab report typography (2026-07-21 rework) */
.ep{margin:8px 0 0;font-size:13.5px;line-height:1.6;color:var(--ink2);
 word-break:break-word}
.elbl{display:inline-block;margin-right:4px;color:var(--ink);
 font:600 11.5px var(--disp);letter-spacing:.04em;text-transform:uppercase}
.ebul{padding-left:14px;position:relative}
.ebul::before{content:"▪";position:absolute;left:1px;color:var(--muted);
 font-size:10px}
.emono{margin:8px 0 0;font:12px/1.5 ui-monospace,Menlo,Consolas,monospace;
 white-space:pre;color:var(--ink2)}
/* Radar event cards */
.ecard{position:relative;overflow:hidden;display:flex;gap:12px;align-items:flex-start;
 background:var(--card);border-radius:14px;box-shadow:var(--shadow);
 padding:12px 14px 12px 16px;margin-bottom:10px}
.ecard.held::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3.5px;
 background:var(--amber)}
.ecard.now::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3.5px;
 background:linear-gradient(180deg,#3b82f6,#8b5cf6)}
.dblk{width:46px;flex:none;text-align:center;background:var(--tile);
 border:1px solid var(--tileline);border-radius:10px;padding:5px 0 4px}
.dnum{font:700 19px/1.15 var(--disp)}
.dmon{font-size:10px;letter-spacing:1.2px;color:var(--muted);text-transform:uppercase}
.etxt{font-size:13.5px;color:var(--ink2);margin-top:3px}
.ewarn{font-size:12.5px;color:var(--amber);margin-top:4px;font-weight:500}
.linkrow{display:block;background:var(--card);border-radius:12px;box-shadow:var(--shadow);
 padding:13px 15px;margin-bottom:9px;color:var(--ink);text-decoration:none;font-size:15px}
.linkrow .d{font-size:12.5px;color:var(--muted);margin-top:1px}
svg{max-width:100%;height:auto}
#gate{max-width:400px;margin:16vh auto 0;padding:0 20px}
#gcard{background:var(--card);border-radius:16px;box-shadow:var(--shadow);
 padding:28px 22px;text-align:center}
#gate input{width:100%;text-align:center;font-size:18px;margin:16px 0 10px}
#gate .bp{width:100%}
#gerr{color:var(--bad);font-size:14px;min-height:20px;margin-top:10px}
.scroll{overflow-x:auto}
footer{color:var(--muted);font-size:11.5px;text-align:center;padding:20px 10px 8px}
</style>
</head>
<body>

<div id="gate">
  <div id="gcard">
    <h1 style="font-size:26px">📡 Mission Control</h1>
    <p class="sub" style="margin-top:6px">Data is encrypted. Enter the passcode.</p>
    <input id="pass" class="inp" type="password" autocomplete="current-password"
           placeholder="passcode" enterkeyhint="go">
    <button id="go" class="bp">Unlock</button>
    <div id="gerr"></div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="wrap">
    <div id="hdr">
      <div>
        <h1>Mission Control</h1>
        <div class="sub" id="stamp"></div>
      </div>
      <div style="display:flex;align-items:center;gap:14px">
        <button id="themetog" aria-label="Toggle dark mode"><span id="knob">
          <svg id="sunic" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/></svg>
          <svg id="moonic" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
        </span></button>
        <div class="ring" title="% of the fund deployed">
          <svg width="60" height="60">
            <defs><linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#8b5cf6"/>
            </linearGradient></defs>
            <circle cx="30" cy="30" r="20" fill="none" stroke="var(--line)" stroke-width="4"/>
            <circle id="ringarc" cx="30" cy="30" r="20" fill="none" stroke="url(#rg)"
              stroke-width="4" stroke-linecap="round"
              stroke-dasharray="125.66" stroke-dashoffset="125.66"
              style="transition:stroke-dashoffset .6s ease;transform:rotate(-90deg);transform-origin:center"/>
          </svg>
          <div class="ringtxt"><span id="ringpct">—</span></div>
        </div>
      </div>
    </div>
    <div id="tabbar"><div id="tabs">
      <button data-t="today" class="on">Today</button>
      <button data-t="home">Home</button>
      <button data-t="book">Book</button>
      <button data-t="fund">Fund</button>
      <button data-t="sig">Record</button>
      <button data-t="radar">Radar</button>
      <button data-t="more">More</button>
      <div id="uline"></div>
    </div></div>
    <div id="tview"><div id="track">
      <div id="t-today" class="tab"></div>
      <div id="t-home" class="tab"></div>
      <div id="t-book" class="tab"></div>
      <div id="t-fund" class="tab"></div>
      <div id="t-sig"  class="tab"></div>
      <div id="t-radar" class="tab"></div>
      <div id="t-more" class="tab"></div>
    </div></div>
    <footer>Updated by each morning run + Friday digest. Not investment advice —
    a surveillance tool for a book Anthony already owns. Swipe ⟷ to change tabs.</footer>
  </div>
</div>

<script>
"use strict";
const $=q=>document.querySelector(q);
let DATA=null;                                   // decrypted payload, re-renderable
let TOK=localStorage.getItem("mc_tok")||"";      // optional GitHub token (in-app editing)
const REPO="aGibbs05/stock-picker";
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const usd=v=>v==null?"—":"$"+Number(v).toLocaleString("en-US",{maximumFractionDigits:v>=100?0:2});
const pct=(v,dp=1)=>v==null?"—":(v>=0?"+":"")+(v*100).toFixed(dp)+"%";
const pp=v=>v==null?"—":(v>=0?"+":"")+v.toFixed(1)+"pp";
const cls=v=>v==null?"":(v>=0?"pos":"neg");
const pill=v=>v==null?"":`<span class="${v>=0?"pillp":"pilln"}">${pct(v)}</span>`;
const tk=t=>`<span class="tk">$${esc(t)}</span>`;   // tickers are always blue
const mdy=d=>{const p=String(d||"").split("-");
  return p.length===3?`${+p[1]}/${+p[2]}/${p[0].slice(2)}`:esc(d)};
const shfmt=v=>v==null?"—":String(+(+v).toFixed(4));
// github-editable files that get IN-APP editors on the More tab
const FILES=[
 ["👤 Callers","Investing/fintwit_accounts.txt",
  "one handle per line · non-AI: handle | nonai | XLV · vet before trusting"],
 ["📗 Thesis rubrics","Investing/thesis_rubrics.txt",
  "TICKER | why you own it | break1; break2"],
 ["📅 Fund calendar","Investing/fund_calendar.json",
  "JSON list of {date, ticker, event, kind} — drives slate widening + gauntlet briefs"],
 ["🏛 13F managers","Investing/superinvestors.txt","Name | CIK (optional)"]];

// ── theme: seeded from the phone's preference, manual toggle wins ──
let THEME=localStorage.getItem("mc_theme")||
  ((window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light");
function applyTheme(t){
  if(document.documentElement&&document.documentElement.dataset)
    document.documentElement.dataset.theme=t;
  const m=document.querySelector('meta[name="theme-color"]');
  if(m&&m.setAttribute)m.setAttribute("content",t==="dark"?"#030712":"#f9fafb");
}
applyTheme(THEME);
{const _t=$("#themetog");if(_t)_t.onclick=()=>{THEME=THEME==="dark"?"light":"dark";
  localStorage.setItem("mc_theme",THEME);applyTheme(THEME);};}

// ── decrypt: data.enc = salt(16) | iv(12) | AES-256-GCM ciphertext ──
async function unlock(pass){
  const r=await fetch("data.enc?ts="+Date.now(),{cache:"no-store"});
  if(!r.ok) throw new Error("data.enc not found ("+r.status+")");
  const buf=await r.arrayBuffer();
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pass),
    "PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:buf.slice(0,16),iterations:250000,hash:"SHA-256"},
    km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:buf.slice(16,28)},
    key,buf.slice(28));
  return JSON.parse(new TextDecoder().decode(pt));
}

// ── GitHub contents API (in-app editing; token lives only in localStorage) ──
const b64e=s=>btoa(unescape(encodeURIComponent(s)));
const b64d=s=>decodeURIComponent(escape(atob(String(s).replace(/\s/g,""))));
const ghH=()=>({Authorization:"Bearer "+TOK,Accept:"application/vnd.github+json"});
async function ghGet(path){
  const r=await fetch(`https://api.github.com/repos/${REPO}/contents/${encodeURI(path)}?ref=main&ts=${Date.now()}`,
    {headers:ghH(),cache:"no-store"});
  if(r.status===401||r.status===403) throw new Error("GitHub token rejected — reconnect in More");
  if(!r.ok) throw new Error("GitHub read failed ("+r.status+")");
  const j=await r.json();return {text:b64d(j.content),sha:j.sha};
}
async function ghPut(path,text,sha,msg){
  const r=await fetch(`https://api.github.com/repos/${REPO}/contents/${encodeURI(path)}`,
    {method:"PUT",headers:ghH(),
     body:JSON.stringify({message:msg,content:b64e(text),sha,branch:"main"})});
  if(!r.ok) throw new Error("GitHub save failed ("+r.status+")");
}

function tile(l,v,s,st){return `<div class="tile ${st||""}"><div class="l">${l}</div><div class="v">${v}</div><div class="s">${s||""}</div></div>`}

let _PERF=null,_BOOK=null,CHART_RANGE="all";   // scrub + range state

function bookCurve(book){
  // single-series dollar curve of Anthony's personal book (Book tab header)
  const pts=(book||[]).filter(p=>p&&p.value!=null&&p.date)
    .map(p=>({t:Date.parse(p.date),v:+p.value}))
    .filter(p=>isFinite(p.t)).sort((a,b)=>a.t-b.t);
  _BOOK=null;
  if(pts.length<2)
    return `<div class="muted" style="font-size:12px;margin-top:8px">tracking since 2026-07-18 — the curve appears as daily points accumulate</div>`;
  const W=600,H=170,P=12,vs=pts.map(p=>p.v),
    lo=Math.min(...vs)*0.995,hi=Math.max(...vs)*1.005;
  const X=t=>P+(t-pts[0].t)*(W-2*P)/((pts[pts.length-1].t-pts[0].t)||1),
        Y=v=>H-P-(v-lo)*(H-2*P)/((hi-lo)||1);
  const last=pts[pts.length-1];
  _BOOK={W,P,t0:pts[0].t,t1:last.t,abs:true,
         series:[{name:"Book",pts:pts.map(p=>({t:p.t,r:p.v}))}]};
  return `<div class="chart" data-chart="book"><div class="xline"></div>
   <svg viewBox="0 0 ${W} ${H}" style="margin-top:10px" role="img" aria-label="personal book value over time">
   <polyline points="${pts.map(p=>X(p.t).toFixed(1)+","+Y(p.v).toFixed(1)).join(" ")}"
     fill="none" stroke="var(--cBook)" stroke-width="2.5" stroke-linejoin="round"/>
   <circle cx="${X(last.t).toFixed(1)}" cy="${Y(last.v).toFixed(1)}" r="4" fill="var(--cBook)"/>
   <text x="${(X(last.t)-6).toFixed(1)}" y="${(Y(last.v)-8).toFixed(1)}" text-anchor="end" fill="var(--ink)" font-size="12">${usd(last.v)}</text></svg>
   <div class="xread muted">touch the chart to inspect · ${new Date(pts[0].t).toISOString().slice(0,10)} → ${new Date(last.t).toISOString().slice(0,10)}</div></div>`;
}

function perfChart(D){
  // Fund + SPY + SMH + Anthony's personal book on ONE chart. Different
  // magnitudes → every line is indexed to 100 at its own first point WITHIN
  // the selected range, so the slopes are directly comparable.
  const f=D.fund||{};
  const rawTs=[];
  const collect=(arr,key)=>{(arr||[]).forEach(p=>{
    if(p&&p[key]!=null&&p.date){const t=Date.parse(p.date);
      if(isFinite(t))rawTs.push(t)}})};
  // book line = time-weighted index when the payload has it (deposits/new
  // holdings move the base, never the line — Anthony 2026-07-21); the raw
  // dollar series stays on the Book tab
  const bookPerf=(D.book_idx&&D.book_idx.length>=2)?D.book_idx:D.book;
  collect(f.snapshots,"equity");collect(bookPerf,"value");
  collect((D.bench||{}).SPY,"close");collect((D.bench||{}).SMH,"close");
  const tmax=rawTs.length?Math.max(...rawTs):0;
  const cut=CHART_RANGE==="all"?-Infinity:tmax-(+CHART_RANGE)*864e5;
  const prep=(arr,key)=>{
    const pts=(arr||[]).filter(p=>p&&p[key]!=null&&p.date)
      .map(p=>({t:Date.parse(p.date),v:+p[key]}))
      .filter(p=>isFinite(p.t)&&p.v>0&&p.t>=cut).sort((a,b)=>a.t-b.t);
    return pts.length>=2?pts.map(p=>({t:p.t,r:p.v/pts[0].v*100})):null;};
  const defs=[
    ["Fund","url(#cg)","#3b82f6",2.5,prep(f.snapshots,"equity")],
    ["Your book","var(--cBook)","var(--cBook)",2,prep(bookPerf,"value")],
    ["SPY","var(--cSpy)","var(--cSpy)",2,prep((D.bench||{}).SPY,"close")],
    ["SMH","var(--cSmh)","var(--cSmh)",2,prep((D.bench||{}).SMH,"close")]];
  const series=defs.filter(d=>d[4])
    .map(([name,col,dot,w,pts])=>({name,col,dot,w,pts}));
  const rngRow=`<div style="display:flex;gap:6px;margin-bottom:8px">${
    [["14","2w"],["30","1m"],["all","All"]].map(([r,l])=>
      `<button class="rng bs" data-r="${r}" style="padding:4px 13px;font-size:12.5px${
        r===CHART_RANGE?";color:var(--blue);border-color:var(--blue)":""}">${l}</button>`)
    .join("")}</div>`;
  _PERF=null;
  if(!series.length)
    return rngRow+`<p class="muted">No data in this range yet — try All.</p>`;
  const allT=[],allR=[100];
  series.forEach(s=>s.pts.forEach(p=>{allT.push(p.t);allR.push(p.r)}));
  const t0=Math.min(...allT),t1=Math.max(...allT),
    lo=Math.min(...allR)-0.6,hi=Math.max(...allR)+0.6;
  const W=600,H=220,P=12;
  const X=t=>P+(t-t0)*(W-2*P)/((t1-t0)||1),
        Y=r=>H-P-(r-lo)*(H-2*P)/((hi-lo)||1);
  let svg=`<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="performance vs benchmarks">
   <defs><linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="0%">
     <stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#8b5cf6"/>
   </linearGradient></defs>
   <line x1="${P}" x2="${W-P}" y1="${Y(100).toFixed(1)}" y2="${Y(100).toFixed(1)}"
     stroke="var(--muted)" stroke-dasharray="4 4" stroke-width="1" opacity=".6"/>`;
  for(const s of series)
    svg+=`<polyline points="${s.pts.map(p=>X(p.t).toFixed(1)+","+Y(p.r).toFixed(1)).join(" ")}"
      fill="none" stroke="${s.col}" stroke-width="${s.w}" stroke-linejoin="round"${
      s.name==="Fund"?"":' opacity=".85"'}/>`;
  svg+=`</svg>`;
  const chips=series.map(s=>{const d=s.pts[s.pts.length-1].r-100;
    return `<span style="display:inline-flex;align-items:center;gap:5px">`+
      `<span style="width:9px;height:9px;border-radius:99px;background:${s.dot};display:inline-block"></span>`+
      `${esc(s.name)} <b class="${d>=0?"pos":"neg"}">${(d>=0?"+":"")+d.toFixed(1)}%</b></span>`}).join("");
  const day=t=>new Date(t).toISOString().slice(0,10);
  _PERF={W,P,t0,t1,abs:false,series};
  return rngRow+`<div class="chart" data-chart="perf"><div class="xline"></div>${svg}
   <div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:9px;font-size:12.5px;color:var(--ink2)">${chips}</div>
   <div class="xread muted">touch the chart to inspect · ${day(t0)} → ${day(t1)} · 100 = each line's start in range</div></div>`;
}

function wireCharts(){
  // press/drag on a chart → crosshair + per-line readout at that date
  document.querySelectorAll(".chart").forEach(ch=>{
    if(ch._wired)return;ch._wired=true;
    const move=cx=>{
      const svg=ch.querySelector&&ch.querySelector("svg");if(!svg)return;
      const info=ch.dataset.chart==="book"?_BOOK:_PERF;if(!info)return;
      const r=svg.getBoundingClientRect();if(!r.width)return;
      const xvb=Math.min(Math.max((cx-r.left)/r.width*info.W,info.P),info.W-info.P);
      const t=info.t0+(xvb-info.P)*(info.t1-info.t0)/((info.W-2*info.P)||1);
      const parts=[new Date(t).toISOString().slice(5,10).replace("-","/")];
      for(const s of info.series){
        let best=s.pts[0];
        for(const p of s.pts)if(Math.abs(p.t-t)<Math.abs(best.t-t))best=p;
        parts.push(info.abs?`${s.name} ${usd(best.r)}`
          :`${s.name} ${(best.r-100>=0?"+":"")+(best.r-100).toFixed(1)}%`);
      }
      const rd=ch.querySelector(".xread");if(rd)rd.textContent=parts.join(" · ");
      const xl=ch.querySelector(".xline");
      if(xl){xl.style.display="block";
        xl.style.left=(cx-ch.getBoundingClientRect().left)+"px";}
    };
    ch.addEventListener("touchstart",e=>{const t=e.touches[0];if(t)move(t.clientX)},{passive:true});
    ch.addEventListener("touchmove",e=>{const t=e.touches[0];if(t){move(t.clientX);e.preventDefault()}},{passive:false});
    ch.addEventListener("mousemove",e=>move(e.clientX));
    ch.addEventListener("touchend",()=>{const xl=ch.querySelector(".xline");
      if(xl)xl.style.display="none"},{passive:true});
  });
}

function setRing(f){
  const arc=$("#ringarc"),txt=$("#ringpct");
  let p=null;
  if(f&&f.equity>0&&f.cash!=null) p=Math.max(0,Math.min(100,(1-f.cash/f.equity)*100));
  if(txt)txt.textContent=p==null?"—":p.toFixed(0)+"%";
  if(arc&&arc.style)arc.style.strokeDashoffset=(125.66-(p==null?0:125.66*p/100)).toFixed(2);
}

function fmtInline(s){
  // escape, then give $TICKERs their app-wide blue
  return esc(s).replace(/\$([A-Z][A-Z.]{0,5})\b/g,'<b class="tk">$$$1</b>');
}
function fmtBody(lines){
  // Typeset a report section for a phone (2026-07-21 rework — the raw
  // monospace dump was dense/cut-off): labeled paragraphs (WHY: / RISK: …)
  // get bold labels + proportional text, status/bullet lines stay one-per-
  // line, hard-wrapped prose re-flows, and only genuinely tabular content
  // (2+ multi-space column gaps) keeps monospace inside its own scroller.
  const out=[];let tbl=[],para=[];
  const flushT=()=>{if(tbl.length){out.push(`<div class="scroll"><pre class="emono">${esc(tbl.join("\n"))}</pre></div>`);tbl=[]}};
  const flushP=()=>{if(para.length){out.push(`<p class="ep">${fmtInline(para.join(" "))}</p>`);para=[]}};
  for(const raw of lines){
    const l=raw.replace(/\s+$/,""),t=l.trim();
    if(!t){flushT();flushP();continue}
    if(/\S\s{2,}\S+\s{2,}\S/.test(l)){flushP();tbl.push(l);continue}
    flushT();
    const lab=t.match(/^([A-Z][A-Za-z '’&/-]{1,26}):\s+(.+)/);
    const bul=/^[•·▪‣-]\s+/.test(t);
    const stat=/^(🔴|🟢|🟡|🔵|⚠️|⚠|⏳|🩳|⚡|✅|❌|▸|⛔)/u.test(t);
    if(lab){flushP();out.push(`<p class="ep"><b class="elbl">${esc(lab[1])}</b> ${fmtInline(lab[2])}</p>`)}
    else if(bul){flushP();out.push(`<p class="ep ebul">${fmtInline(t.replace(/^[•·▪‣-]\s+/,""))}</p>`)}
    else if(stat){flushP();out.push(`<p class="ep">${fmtInline(t)}</p>`)}
    else para.push(t);
  }
  flushT();flushP();
  return out.join("");
}
function emailCards(e){
  // split a sent report into cards at its "── SECTION ──" headers
  const secs=[];let cur={h:"",lines:[]};
  for(const line of String(e.body||"").split("\n")){
    if(/^──/.test(line.trim())){
      if(cur.h||cur.lines.join("").trim())secs.push(cur);
      cur={h:line.replace(/─/g,"").trim(),lines:[]};
    }else cur.lines.push(line);
  }
  if(cur.h||cur.lines.join("").trim())secs.push(cur);
  const dotFor=h=>/PICK/i.test(h)?"#3b82f6":/BOOK/i.test(h)?"#0f766e"
    :/FUND/i.test(h)?"#8b5cf6":/ASK|GAUNTLET|EARNINGS|CAMPING/i.test(h)?"#b45309"
    :"#6b7280";
  return secs.map(s=>`<div class="card">${s.h?`<b style="font:600 14px var(--disp)"><span class="sdot" style="background:${dotFor(s.h)}"></span>${esc(s.h)}</b>`:""}
    ${fmtBody(s.lines)}</div>`).join("");
}

  const lots=(f.lots||[]).slice().reverse().map(l=>`<tr><td class="muted">${mdy(l.date)}</td>

  $("#t-fund").innerHTML=`<div class="tiles">${

function sweepNewRow(rows,tRaw,sRaw){
  // Pull the Add-row inputs into `rows`. ok:false = BLOCK the action and show
  // err (never silently drop what the user typed). Empty box = nothing to do.
  const raw=String(tRaw||"").trim();
  if(!raw)return{ok:true,added:false};
  const t=raw.toUpperCase().replace(/^\$/,"");
  if(!/^[A-Z.]{1,6}$/.test(t))
    return{ok:false,err:`didn't save — "${raw}" isn't a ticker (1-6 letters; put the share count in the second box)`};
  if(rows.some(r=>r.t===t))
    return{ok:false,err:"didn't save — "+t+" is already in the list above"};
  rows.push({t,s:String(sRaw||"").trim()});
  return{ok:true,added:true};
}
function parseHoldings(text){
  const head=[],rows=[];
  for(const line of text.split("\n")){
    if(!rows.length&&line.trim().startsWith("#")){head.push(line);continue;}
    const p=line.split("#")[0].trim().split(/\s+/).filter(Boolean);
    if(!p.length) continue;
    const t=p[0].toUpperCase().replace(/^\$/,"");
    if(t&&t.length<=6) rows.push({t,s:p[1]||""});
  }
  return {head,rows};
}
async function openShares(){
  const ed=$("#shed");
  ed.innerHTML='<div class="card muted">loading holdings…</div>';
  try{
    const {text,sha}=await ghGet("Investing/holdings.txt");
    const {head,rows}=parseHoldings(text);
    ed._head=head;ed._sha=sha;
    drawShares(ed,rows);
  }catch(e){ed.innerHTML=`<div class="card" style="color:var(--bad)">${esc(e.message)}</div>`}
}
function drawShares(ed,rows){
  ed._rows=rows;
  ed.innerHTML=`<div class="card"><b>Edit share counts</b>
   <div class="muted" style="font-size:12.5px;margin-top:2px">blank = tracked but not valued · ✕ removes the holding entirely (surveillance stops)</div>
   ${rows.map((r,i)=>`<div style="display:flex;gap:8px;align-items:center;margin-top:8px">
     <b style="width:74px">$${esc(r.t)}</b>
     <input class="shin inp" data-i="${i}" type="text" inputmode="decimal" value="${esc(r.s)}" placeholder="shares" style="flex:1">
     <a href="#" class="shdel" data-i="${i}" style="color:var(--bad);padding:4px 8px;text-decoration:none">✕</a></div>`).join("")}
   <div style="display:flex;gap:8px;margin-top:12px">
     <input id="newt" class="inp" placeholder="TICKER" autocapitalize="characters" style="width:92px">
     <input id="news" class="inp" placeholder="shares" inputmode="decimal" style="flex:1">
     <button id="shadd" class="bs">Add</button></div>
   <div style="display:flex;gap:8px;margin-top:12px">
     <button id="shsave" class="bp" style="flex:1">Save</button>
     <button id="shx" class="bs">Cancel</button></div>
   <div id="shmsg" class="muted" style="font-size:12.5px;margin-top:8px"></div></div>`;
  const grab=()=>{document.querySelectorAll(".shin").forEach(x=>{ed._rows[+x.dataset.i].s=x.value.trim()})};
  document.querySelectorAll(".shdel").forEach(a=>a.onclick=e=>{e.preventDefault();grab();
    ed._rows.splice(+a.dataset.i,1);drawShares(ed,ed._rows)});
  $("#shadd").onclick=()=>{grab();
    const res=sweepNewRow(ed._rows,$("#newt").value,$("#news").value);
    if(!res.ok){$("#shmsg").textContent=res.err;return}
    if(res.added)drawShares(ed,ed._rows)};
  $("#shx").onclick=()=>{ed.innerHTML=""};
  $("#shsave").onclick=async()=>{
    grab();
    // Save sweeps the Add row in (Anthony 2026-07-21: he typed the new ticker
    // there and tapped Save — the old code silently ignored it and "saved"
    // the unchanged list; every add attempt vanished without an error)
    const res=sweepNewRow(ed._rows,$("#newt")?$("#newt").value:"",
                          $("#news")?$("#news").value:"");
    if(!res.ok){$("#shmsg").textContent=res.err;return}
    $("#shmsg").textContent="saving to GitHub…";
    try{
      const head=ed._head.length?ed._head:
        ["# Anthony's personal holdings — TICKER [shares]; # = comment.",
         "# Edited from the Mission Control app."];
      const body=ed._rows.map(r=>r.s?`${r.t} ${r.s}`:r.t);
      await ghPut("Investing/holdings.txt",[...head,...body,""].join("\n"),
                  ed._sha,"app: update holdings/share counts");
      // sha refresh: without this, a SECOND save from the same open editor
      // (e.g. adding a 19th holding after a first save) 409s forever
      try{ed._sha=(await ghGet("Investing/holdings.txt")).sha}catch(_){}
      // kick the free data refresh so the new holding gets valued into the
      // payload in ~2 min (best-effort; publish.yml cancels stale runs)
      fetch(`https://api.github.com/repos/${REPO}/actions/workflows/publish.yml/dispatches`,
        {method:"POST",headers:ghH(),body:JSON.stringify({ref:"main"})}).catch(()=>{});
      // reflect immediately: keep known quotes, swap in the new share counts
      const old={};(DATA.personal||[]).forEach(h=>old[h.ticker]=h);
      DATA.personal=ed._rows.map(r=>({...(old[r.t]||{ticker:r.t,quote:null,thesis:"",breaks:[]}),
        ticker:r.t,shares:r.s?parseFloat(r.s):null}));
      render(DATA);
      $("#shmsg")&&($("#shmsg").textContent="saved ✓");
    }catch(e){
      if(/409|422/.test(e.message||"")){
        // stale editor (another save landed since it opened) — resync from
        // the live file, KEEP any tickers added here, ask for one more tap
        try{
          const fresh=await ghGet("Investing/holdings.txt");
          const fp=parseHoldings(fresh.text);
          const have=new Set(fp.rows.map(r=>r.t));
          const added=ed._rows.filter(r=>!have.has(r.t));
          ed._head=fp.head;ed._sha=fresh.sha;
          drawShares(ed,[...fp.rows,...added]);
          $("#shmsg").textContent="the file changed since this editor opened — re-synced (your added tickers kept). Check the numbers, tap Save again.";
        }catch(e2){$("#shmsg").textContent=e2.message}
      }else $("#shmsg").textContent=e.message}};
}

async function saveOneShare(t){
  // per-holding save (Anthony 2026-07-18): edits ONLY that ticker's line in
  // holdings.txt, preserving every other line and the header comments
  const inp=document.querySelector(`.hsin[data-t="${t}"]`);
  const msg=document.querySelector(`.hmsg[data-t="${t}"]`);
  const val=((inp&&inp.value)||"").trim();
  if(msg)msg.textContent="saving…";
  try{
    const {text,sha}=await ghGet("Investing/holdings.txt");
    let found=false;
    const out=text.split("\n").map(line=>{
      const p=line.split("#")[0].trim().split(/\s+/).filter(Boolean);
      if(p.length&&p[0].toUpperCase().replace(/^\$/,"")===t){
        found=true;return val?`${t} ${val}`:t;}
      return line;});
    if(!found)out.push(val?`${t} ${val}`:t);
    await ghPut("Investing/holdings.txt",out.join("\n"),sha,
                `app: ${t} share count`);
    const h=(DATA.personal||[]).find(x=>x.ticker===t);
    if(h)h.shares=val?parseFloat(val):null;
    render(DATA);
  }catch(e){if(msg)msg.textContent=e.message}
}

async function refreshAsks(){

  // on this phone, show the LIVE asks.txt instead. (Fixes "adding QCOM took
  // off AMD": a background payload refresh was visually hiding asks added
  // since the last run; the file itself always had both. 2026-07-20)
  if(!TOK)return;
  const box=$("#askpend");if(!box)return;
  try{
    const {text}=await ghGet("Investing/asks.txt");
    const lines=text.split(/\r?\n/).map(s=>s.trim())
      .filter(s=>s&&!s.startsWith("#"));
    box.innerHTML=lines.length
      ?`<ul style="padding-left:18px">${lines.map(l=>`<li>${esc(l)}</li>`).join("")}</ul>
        <p class="muted" style="font-size:11.5px;margin-top:6px">live from asks.txt</p>`
      :'<p class="muted">none queued</p>';
  }catch(e){/* keep the payload view — stale beats broken */}
}

// ── tabs: sliding track + finger-following swipe ──
// All five tabs are pre-rendered side by side on a 500%-wide track; changing
// tabs translates the track, so the neighbor physically slides into frame.
// Inactive tabs collapse (height:0) AFTER the slide settles so the page's
// scroll height belongs to the visible tab only.
const ORDER=["today","home","book","fund","sig","radar","more"];
let CUR="today",_collapseT=null;
function _setTrack(idx,extraPx){
  const tr=$("#track");
  if(tr&&tr.style)tr.style.transform=
    `translateX(calc(${-(idx*100/ORDER.length).toFixed(4)}% + ${extraPx||0}px))`;
}
function _uncollapse(){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("off"));
}
function goTab(name){
  const changed=name!==CUR;
  CUR=name;
  const idx=ORDER.indexOf(name);
  document.querySelectorAll("#tabs button").forEach(b=>
    b.classList[b.dataset.t===name?"add":"remove"]("on"));
  _uncollapse();
  const tr=$("#track");
  if(tr&&tr.style)tr.style.transition="";
  _setTrack(idx,0);
  const b=document.querySelector(`#tabs button[data-t="${name}"]`),u=$("#uline");
  if(b&&u&&b.offsetWidth){
    u.style.left=b.offsetLeft+"px";u.style.width=b.offsetWidth+"px";
    if(b.scrollIntoView)b.scrollIntoView({inline:"nearest",block:"nearest"});
  }
  if(changed)window.scrollTo(0,0);
  clearTimeout(_collapseT);
  _collapseT=setTimeout(()=>{document.querySelectorAll(".tab").forEach(t=>{
    if(t.id!=="t-"+CUR)t.classList.add("off")})},380);
}
document.querySelectorAll("#tabs button").forEach(b=>b.onclick=()=>goTab(b.dataset.t));
let _dg=null;
if(document.addEventListener){
  document.addEventListener("touchstart",e=>{
    const t=e.touches&&e.touches[0];if(!t)return;
    let blocked=e.target&&e.target.closest&&
      !!e.target.closest("#tabs,input,textarea,.chart");
    // a table only owns the gesture if it genuinely has sideways content to
    // pan — a list that fits the screen shouldn't eat the tab swipe
    if(!blocked&&e.target&&e.target.closest){
      const sc=e.target.closest(".scroll");
      if(sc&&sc.scrollWidth>sc.clientWidth+2)blocked=true;
    }
    _dg=blocked?null:{x:t.clientX,y:t.clientY,locked:false,dead:false,dx:0,
                      t:Date.now()};
  },{passive:true});
  document.addEventListener("touchmove",e=>{
    if(!_dg||_dg.dead||!DATA)return;
    const t=e.touches&&e.touches[0];if(!t)return;
    const dx=t.clientX-_dg.x,dy=t.clientY-_dg.y;
    if(!_dg.locked){
      if(Math.abs(dy)>14&&Math.abs(dy)>Math.abs(dx)){_dg.dead=true;return}
      if(Math.abs(dx)>14&&Math.abs(dx)>Math.abs(dy)*1.4){
        _dg.locked=true;_uncollapse();
        const tr=$("#track");if(tr&&tr.style)tr.style.transition="none";
      }else return;
    }
    e.preventDefault();          // horizontal drag owns the gesture now
    _dg.dx=dx;
    const idx=ORDER.indexOf(CUR);
    let px=dx;
    if((idx===0&&dx>0)||(idx===ORDER.length-1&&dx<0))px=dx/3;  // rubber-band
    _setTrack(idx,px);
  },{passive:false});
  document.addEventListener("touchend",()=>{
    if(_dg&&_dg.locked){
      const dx=_dg.dx,idx=ORDER.indexOf(CUR);
      const tr=$("#track");if(tr&&tr.style)tr.style.transition="";
      // commit on distance OR on a quick flick (short but fast)
      const flick=Math.abs(dx)>25&&(Date.now()-_dg.t)<250;
      const step=(Math.abs(dx)>60||flick)?(dx<0?1:-1):0;
      const j=Math.max(0,Math.min(ORDER.length-1,idx+step));
      goTab(ORDER[j]);
    }
    _dg=null;
  },{passive:true});
}

// ── offline shell + auto-refresh on return ──
if(typeof navigator!=="undefined"&&"serviceWorker" in navigator){
  try{navigator.serviceWorker.register("sw.js")}catch(e){}
}
let _lastRef=0;
if(document.addEventListener){
  document.addEventListener("visibilitychange",()=>{
    const p=localStorage.getItem("mc_pass");
    if(document.visibilityState==="visible"&&p&&DATA
       &&Date.now()-_lastRef>60000){
      _lastRef=Date.now();tryUnlock(p,false);
    }
  });
}

// ── gate wiring + instant-open (stale-while-revalidate) ──
// With a remembered passcode, the LAST decrypted payload renders instantly
// from cache while the fresh fetch + key-derivation runs in the background —
// the app opens in ~0ms instead of waiting on network + PBKDF2.
async function tryUnlock(pass,remember){
  try{
    const D=await unlock(pass);
    if(remember) localStorage.setItem("mc_pass",pass);
    _lastRef=Date.now();
    try{localStorage.setItem("mc_cache",JSON.stringify(D))}catch(e){}
    $("#gate").style.display="none";$("#app").style.display="block";
    DATA=D;
    render(D);
    if(window.requestAnimationFrame)requestAnimationFrame(()=>goTab(CUR));
  }catch(err){
    if(DATA){   // cached view already on screen — stay on it, note quietly
      $("#stamp").textContent=(DATA.generated?("as of "+DATA.generated):"")+
        " · couldn't refresh (offline?) — showing last data";
      return;
    }
    localStorage.removeItem("mc_pass");
    $("#gerr").textContent=/decrypt|operation/i.test(String(err))?
      "Wrong passcode.":"Couldn't load: "+err.message;
  }
}
$("#go").onclick=()=>tryUnlock($("#pass").value.trim(),true);
$("#pass").addEventListener("keydown",e=>{if(e.key==="Enter")$("#go").click()});
const saved=localStorage.getItem("mc_pass");
if(saved){
  const c=localStorage.getItem("mc_cache");
  if(c){
    try{
      DATA=JSON.parse(c);
      $("#gate").style.display="none";$("#app").style.display="block";
      render(DATA);
      $("#stamp").textContent+=" · refreshing…";
      if(window.requestAnimationFrame)requestAnimationFrame(()=>goTab(CUR));
    }catch(e){DATA=null}
  }
  if(!DATA)$("#gerr").textContent="unlocking…";
  tryUnlock(saved,false).then(()=>{const g=$("#gerr");if(g)g.textContent=""});
}
</script>
</body>
</html>
